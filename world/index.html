<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0a1e" />
    <title>Mishi weds Mrigank</title>
    <style>
      :root {
        --gold: #e9c46a;
        --gold-bright: #ffd97a;
        --burgundy: #4a0e18;
        --ink: #1a0a12;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden; background: #0a0512;
        overscroll-behavior: none;
      }
      #root { position: fixed; inset: 0; }
      canvas { display: block; touch-action: none; }

      /* Fonts: system serif fallback keeps it self-contained (no external fetch) */
      .serif { font-family: "Cormorant Garamond", "Georgia", "Times New Roman", serif; }

      /* ---- Loading veil ---- */
      #loading {
        position: fixed; inset: 0; z-index: 30;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px;
        background: radial-gradient(ellipse at 50% 60%, #2a1020 0%, #14060f 70%, #0a0512 100%);
        transition: opacity 1.1s ease;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .diya-ring {
        width: 58px; height: 58px; border-radius: 50%;
        border: 2px solid rgba(233,196,106,0.18);
        border-top-color: var(--gold-bright);
        animation: spin 1.1s linear infinite;
        box-shadow: 0 0 24px rgba(255,180,90,0.25);
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading .msg {
        color: var(--gold); letter-spacing: 3px; font-size: 15px;
        text-transform: uppercase; opacity: 0.85;
      }
      @media (prefers-reduced-motion: reduce) {
        .diya-ring { animation: none !important; }
        #loading { transition-duration: .01s; }
      }

      /* ---- Title card ---- */
      #titlecard {
        position: fixed; left: 0; right: 0; top: 8%; z-index: 20;
        display: flex; flex-direction: column; align-items: center; text-align: center;
        pointer-events: none; padding: 0 20px;
        transition: opacity 1.6s ease, transform 1.6s ease;
      }
      #titlecard.gone { opacity: 0; transform: translateY(-14px); }
      #titlecard .om { color: var(--gold-bright); font-size: 22px; letter-spacing: 6px; opacity: 0.9;
        text-shadow: 0 0 18px rgba(255,190,90,0.5); }
      #titlecard h1 {
        color: #fff6e6; font-weight: 500; font-size: clamp(34px, 7vw, 74px);
        letter-spacing: 2px; line-height: 1.05; margin: 6px 0 4px;
        text-shadow: 0 2px 30px rgba(0,0,0,0.55), 0 0 40px rgba(255,180,90,0.28);
      }
      #titlecard .rule {
        display: flex; align-items: center; gap: 12px; margin: 6px 0; opacity: 0.9;
      }
      #titlecard .rule span { height: 1px; width: min(90px, 22vw);
        background: linear-gradient(90deg, transparent, var(--gold), transparent); }
      #titlecard .rule b { color: var(--gold); font-size: 16px; font-weight: 400; }
      #titlecard .sub { color: var(--gold); font-size: clamp(14px, 2.6vw, 19px);
        letter-spacing: 4px; text-transform: uppercase; opacity: 0.82; }

      /* ---- Hint ---- */
      #hint {
        position: fixed; left: 0; right: 0; bottom: 22px; z-index: 20; text-align: center;
        color: rgba(255,235,205,0.7); font-size: 13px; letter-spacing: 2px;
        text-transform: uppercase; pointer-events: none;
        transition: opacity 1s ease;
      }
      #hint.gone { opacity: 0; }
      #hint .mobile-copy { display: none; }

      /* ---- Arrival beat ---- */
      #arrivalMoment {
        position: fixed; left: 50%; top: 18%; z-index: 22;
        min-width: min(520px, calc(100vw - 36px)); padding: 14px 24px 16px;
        text-align: center; pointer-events: none;
        color: #fff6e6; border: 1px solid rgba(255,217,122,0.48);
        background: linear-gradient(135deg, rgba(74,14,24,0.88), rgba(26,10,18,0.72));
        box-shadow: 0 12px 45px rgba(20,4,10,0.4), inset 0 0 28px rgba(255,190,90,0.08);
        backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
        opacity: 0; transform: translate(-50%, -12px) scale(0.96);
        transition: opacity 0.65s ease, transform 0.65s ease;
      }
      #arrivalMoment.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
      #arrivalMoment .eyebrow { color: var(--gold); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
      #arrivalMoment .arrival-title { margin-top: 4px; font-size: clamp(24px, 5vw, 42px); font-weight: 500; letter-spacing: 1px; }

      /* ---- Sound + one unobtrusive mobile follow control ---- */
      #soundBtn {
        position: fixed; top: calc(env(safe-area-inset-top) + 14px); right: calc(env(safe-area-inset-right) + 14px);
        z-index: 25; width: 44px; height: 44px; border-radius: 50%;
        border: 1px solid rgba(233,196,106,0.5); background: rgba(26,10,18,0.55);
        color: var(--gold); font-size: 20px; cursor: pointer; touch-action: manipulation;
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); line-height: 1;
      }
      #followBtn {
        display: none; border: 1px solid rgba(255,217,122,0.58);
        color: #fff2d6; background: rgba(42,10,24,0.76);
        box-shadow: 0 5px 20px rgba(10,2,8,0.3), inset 0 0 16px rgba(255,190,90,0.07);
        font: 600 12px/1 system-ui, sans-serif; letter-spacing: 1px; text-transform: uppercase;
        touch-action: manipulation; user-select: none; -webkit-user-select: none;
      }
      #soundBtn:active, #followBtn:active { background: rgba(124,33,46,0.88); }
      #soundBtn:focus-visible, #followBtn:focus-visible {
        outline: 3px solid rgba(255,217,122,0.9); outline-offset: 3px;
      }

      @media (max-width: 900px), (pointer: coarse) {
        #titlecard { top: 5%; padding: 0 12px; }
        #titlecard h1 {
          font-size: clamp(23px, 7.2vw, 40px); letter-spacing: 0.2px;
          white-space: nowrap;
        }
        #titlecard .om { font-size: 18px; letter-spacing: 4px; }
        #titlecard .sub { font-size: clamp(12px, 3.8vw, 17px); letter-spacing: 3px; }
        #hint {
          bottom: calc(env(safe-area-inset-bottom) + 74px); padding: 0 26px;
          font-size: 10px; line-height: 1.45; letter-spacing: 1px;
        }
        #hint .desktop-copy { display: none; }
        #hint .mobile-copy { display: block; max-width: 330px; margin: 0 auto; }
        #arrivalMoment { top: 15%; padding: 12px 18px 14px; backdrop-filter: none; -webkit-backdrop-filter: none; }
        #soundBtn { width: 48px; height: 48px; backdrop-filter: none; -webkit-backdrop-filter: none; }
        #soundBtn[aria-pressed="false"]::after {
          content: "Tap for wedding music";
          position: absolute; right: 56px; top: 50%; transform: translateY(-50%);
          width: max-content; padding: 9px 12px; border-radius: 18px;
          border: 1px solid rgba(255,217,122,.58); color: #fff2d6;
          background: rgba(42,10,24,.9); box-shadow: 0 5px 18px rgba(10,2,8,.28);
          font: 600 11px/1 system-ui, sans-serif; letter-spacing: .4px;
          pointer-events: none;
        }
        #followBtn {
          display: block; position: fixed;
          right: calc(env(safe-area-inset-right) + 14px);
          bottom: calc(env(safe-area-inset-bottom) + 14px);
          z-index: 25; min-width: 118px; min-height: 48px; padding: 0 16px; border-radius: 24px;
          visibility: hidden; opacity: 0; pointer-events: none; transform: translateY(8px);
          transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s ease;
        }
        #followBtn.show { visibility: visible; opacity: 1; pointer-events: auto; transform: translateY(0); }
      }

      @media (max-height: 430px) and (orientation: landscape) {
        #hint { display: none; }
        #arrivalMoment { top: 7%; padding: 8px 14px 10px; }
        #soundBtn { width: 44px; height: 44px; }
        #followBtn { right: calc(env(safe-area-inset-right) + 8px); bottom: calc(env(safe-area-inset-bottom) + 8px); min-height: 44px; }
      }

      /* ---- Vignette for cinematic framing ---- */
      #vignette {
        position: fixed; inset: 0; z-index: 10; pointer-events: none;
        box-shadow: inset 0 0 220px 40px rgba(20,4,10,0.55);
        background: radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(20,4,12,0.35) 100%);
      }
    </style>
    <script type="module" crossorigin src="./assets/index-dCd-8XEf.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="vignette"></div>

    <div id="titlecard" class="serif">
      <div class="om">॥ शुभ विवाह ॥</div>
      <h1>Mishi <span style="font-size:0.6em; opacity:0.85; font-style:italic;">weds</span> Mrigank</h1>
      <div class="rule"><span></span><b>&#10022;</b><span></span></div>
      <div class="sub">A Royal Baraat</div>
    </div>

    <div id="hint" class="serif">
      <span class="desktop-copy">Drag to orbit &middot; Scroll to zoom &middot; <b>W A S D</b> / arrows to fly &middot; Right-drag to pan</span>
      <span class="mobile-copy">Drag to orbit &middot; Pinch to zoom<br />Two-finger drag to pan &middot; Tap Follow to rejoin &middot; Tap &#128266; for music</span>
    </div>

    <div id="arrivalMoment" class="serif" role="status" aria-live="polite" aria-hidden="true">
      <div class="eyebrow">The baraat has arrived</div>
      <div class="arrival-title">Mishi &amp; Mrigank</div>
    </div>

    <button id="soundBtn" type="button" title="Play wedding music" aria-label="Play wedding music" aria-pressed="false">&#128263;</button>
    <button id="followBtn" type="button" aria-label="Resume following the baraat">Follow Baraat</button>

    <div id="loading" class="serif">
      <div class="diya-ring"></div>
      <div class="msg" id="loadingMessage">Lighting the diyas&hellip;</div>
    </div>

  </body>
</html>
